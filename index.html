<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navigation CSTJF - Mode Calibration</title>
    <style>
        :root { --primary: #004a99; --accent: #ff0000; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #2c3e50; color: white; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; cursor: grab; }
        #viewport:active { cursor: grabbing; }
        #map-wrapper { position: absolute; transform-origin: 0 0; }
        #map-image { display: block; max-width: none; width: 1500px; height: auto; }
        
        .label { position: absolute; background: rgba(0, 0, 0, 0.75); padding: 5px 10px; border-radius: 5px; font-size: 14px; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); pointer-events: none; transform: translate(-50%, -50%); white-space: nowrap; z-index: 10; }
        .lab-highlight { border: 2px solid gold; color: gold; }
        
        #user-dot { position: absolute; width: 24px; height: 24px; background: #007bff; border: 4px solid white; border-radius: 50%; display: none; box-shadow: 0 0 15px rgba(0,123,255,0.8); z-index: 999; transform: translate(-50%, -50%); transition: background 0.3s ease; }
        
        .ui-overlay { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .btn { width: 60px; height: 60px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.9); }
        
        #debug-panel { position: fixed; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.95); color: #000; padding: 15px; border-radius: 8px; border: 2px solid #ff0000; z-index: 1000; font-family: monospace; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); pointer-events: none; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <strong>🛠️ CALIBRATION GPS</strong><br>
        Lat: <span id="debug-lat">En attente...</span><br>
        Lon: <span id="debug-lon">En attente...</span>
    </div>

    <div id="viewport">
        <div id="map-wrapper">
            <img id="map-image" src="map.jpg?v=9" alt="Plan CSTJF" onerror="alert('Image map.jpg introuvable !');">
            <div id="user-dot"></div>
            
            <div class="label lab-highlight" style="top: 48%; left: 68%;">🔬 LABO 5</div>
            <div class="label lab-highlight" style="top: 55%; left: 16%;">🔬 LABO 4</div>
            <div class="label" style="top: 8%; left: 68%;">📍 ACCUEIL (7)</div>
        </div>
    </div>

    <div class="ui-overlay">
        <button class="btn" onclick="toggleGPS()" id="gps-btn">🛰️</button>
        <button class="btn" onclick="resetView()">🏠</button>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const dot = document.getElementById('user-dot');
        const img = document.getElementById('map-image');
        const debugLat = document.getElementById('debug-lat');
        const debugLon = document.getElementById('debug-lon');
        let watchId = null;

        // Nouvelles frontières calculées grâce à ton point L5
        const bounds = {
            north: 43.3226,
            south: 43.3166,
            west: -0.3166,
            east: -0.3076
        };

        const zoom = d3.zoom().scaleExtent([0.3, 4]).on('zoom', (e) => {
            d3.select('#map-wrapper').style('transform', `translate(${e.transform.x}px, ${e.transform.y}px) scale(${e.transform.k})`);
        });

        d3.select('#viewport').call(zoom);

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            debugLat.innerText = lat.toFixed(6);
            debugLon.innerText = lon.toFixed(6);

            if (img.style.display === 'none') return; 

            const w = img.clientWidth;
            const h = img.clientHeight;

            const x = ((lon - bounds.west) / (bounds.east - bounds.west)) * w;
            const y = ((bounds.north - lat) / (bounds.north - bounds.south)) * h;

            dot.style.display = 'block';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
        }

        function toggleGPS() {
            const btn = document.getElementById('gps-btn');
            if (watchId === null) {
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(updatePosition, 
                        (err) => alert("Erreur GPS : " + err.message), 
                        { enableHighAccuracy: true });
                    btn.style.background = "#28a745";
                }
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btn.style.background = "#004a99";
                dot.style.display = 'none';
                debugLat.innerText = "En attente...";
                debugLon.innerText = "En attente...";
            }
        }

        function resetView() {
            d3.select('#viewport').transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(0, 50).scale(Math.max(window.innerWidth / 1500, 0.4)));
        }

        if(img.complete) resetView(); else img.onload = resetView;
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    </script>
</body>
</html>
