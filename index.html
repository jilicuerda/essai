<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navigation CSTJF - Labo 4 & 5</title>
    <style>
        :root {
            --primary: #004a99;
            --accent: #ff0000;
        }
        
        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #2c3e50; 
            color: white;
            overflow: hidden; 
        }

        /* Conteneur principal pour le zoom et le scroll */
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            cursor: grab;
        }

        #map-wrapper {
            position: relative;
            display: inline-block;
        }

        #map-image {
            display: block;
            max-width: none;
            /* On force une largeur pour avoir une bonne résolution de navigation */
            width: 1500px; 
            height: auto;
        }

        /* Style des étiquettes */
        .label {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        .lab-highlight {
            border: 2px solid gold;
            color: gold;
        }

        /* Le point GPS */
        #user-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #007bff;
            border: 4px solid white;
            border-radius: 50%;
            display: none;
            box-shadow: 0 0 15px rgba(0,123,255,0.8);
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }

        /* Boutons de contrôle */
        .ui-overlay {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.9); }

        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            pointer-events: none;
            border-left: 4px solid var(--primary);
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <strong>📍 Navigation Labos</strong><br>
        Trajet : Laboratoire 4 <-> Laboratoire 5
    </div>

    <div id="viewport">
        <div id="map-wrapper">
            <img id="map-image" src="map.jpg" alt="Plan TotalEnergies Pau">
            
            <div id="user-dot"></div>

            <div class="label lab-highlight" style="top: 38%; left: 23.5%;">🔬 LABORATOIRE 5</div>
            <div class="label lab-highlight" style="top: 55%; left: 16%;">🔬 LABORATOIRE 4</div>
            <div class="label" style="top: 48%; left: 53%;">BÂTIMENT CENTRAL</div>
            <div class="label" style="top: 80%; left: 88%;">ACCÈS AVENUE EUROPE</div>
        </div>
    </div>

    <div class="ui-overlay">
        <button class="btn" onclick="toggleGPS()" id="gps-btn">🛰️</button>
        <button class="btn" onclick="resetView()">🏠</button>
    </div>

    <script>
        const dot = document.getElementById('user-dot');
        const wrapper = document.getElementById('map-wrapper');
        let watchId = null;

        // Bornes GPS réelles du site (à ajuster lors de tes tests sur place)
        const bounds = {
            north: 43.3235,
            south: 43.3175,
            west: -0.3190,
            east: -0.3110
        };

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            const img = document.getElementById('map-image');
            const w = img.clientWidth;
            const h = img.clientHeight;

            // Calcul de conversion GPS -> Pixels
            const x = ((lon - bounds.west) / (bounds.east - bounds.west)) * w;
            const y = ((bounds.north - lat) / (bounds.north - bounds.south)) * h;

            // Mise à jour du point
            dot.style.display = 'block';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';

            // Auto-scroll pour garder le point visible
            dot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }

        function toggleGPS() {
            const btn = document.getElementById('gps-btn');
            if (watchId === null) {
                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(updatePosition, 
                        (err) => alert("Erreur GPS : " + err.message), 
                        { enableHighAccuracy: true });
                    btn.style.background = "#28a745";
                    btn.innerText = "📍";
                }
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btn.style.background = "#004a99";
                btn.innerText = "🛰️";
                dot.style.display = 'none';
            }
        }

        function resetView() {
            window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        }

        // Empêcher le zoom automatique du navigateur pour garder le contrôle
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
